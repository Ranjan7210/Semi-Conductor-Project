<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Advanced Hall Effect Simulation</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #00e5ff;
      --primary-dim: rgba(0, 229, 255, 0.2);
      --bg-dark: #070b14;
      --panel-bg: rgba(16, 25, 43, 0.7);
      --panel-border: rgba(255, 255, 255, 0.05);
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
    }

    body {
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(circle at top right, rgba(0, 229, 255, 0.15) 0%, transparent 60%),
        radial-gradient(circle at bottom left, rgba(0, 229, 255, 0.05) 0%, transparent 50%),
        url("data:image/svg+xml,%3Csvg%20width='200'%20height='200'%20xmlns='http://www.w3.org/2000/svg'%3E%3Cg%20stroke='rgba(0,229,255,0.08)'%20stroke-width='1.5'%20fill='none'%3E%3Cpath%20d='M25%200v10l20%2010%2020-10V0M45%2020v20l-20%2010-20-10V20M45%2040l20%2010v20l-20%2010M85%200v10l-20%2010'/%3E%3Crect%20x='100'%20y='80'%20width='40'%20height='40'%20rx='4'/%3E%3Cpath%20d='M105%2075v5M115%2075v5M125%2075v5M135%2075v5M105%20120v5M115%20120v5M125%20120v5M135%20120v5M95%2085h5M95%2095h5M95%20105h5M95%20115h5M140%2085h5M140%2095h5M140%20105h5M140%20115h5M0%20150h30l20-20h40l20%2020h20M150%2020v40M135%2040h30M150%2040l15%2015h10M150%2040l-15%2015h-10'/%3E%3Ccircle%20cx='30'%20cy='150'%20r='3'%20fill='rgba(0,229,255,0.08)'/%3E%3Ccircle%20cx='90'%20cy='130'%20r='3'%20fill='rgba(0,229,255,0.08)'/%3E%3Ccircle%20cx='110'%20cy='150'%20r='3'%20fill='rgba(0,229,255,0.08)'/%3E%3Cellipse%20cx='160'%20cy='170'%20rx='15'%20ry='5'%20transform='rotate(45%20160%20170)'/%3E%3Cellipse%20cx='160'%20cy='170'%20rx='15'%20ry='5'%20transform='rotate(-45%20160%20170)'/%3E%3Ccircle%20cx='160'%20cy='170'%20r='2'%20fill='rgba(0,229,255,0.08)'/%3E%3C/g%3E%3C/svg%3E");
      background-attachment: fixed;
      color: var(--text-main);
      font-family: "Inter", sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    h1 {
      text-align: center;
      color: var(--primary);
      margin: 15px 0 10px 0;
      font-size: 2rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      text-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
    }

    .main-container {
      display: grid;
      grid-template-columns: 380px 1fr;
      grid-template-rows: auto auto;
      grid-template-areas:
        "controls simulation"
        "controls graph";
      gap: 20px;
      padding: 10px 40px 30px;
      box-sizing: border-box;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
      flex: 1;
    }

    .glass-panel {
      background: var(--panel-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--panel-border);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    #controlPanel {
      grid-area: controls;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    h2 {
      margin-top: 0;
      font-size: 1.2rem;
      font-weight: 600;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }

    h2::before {
      content: "";
      display: block;
      width: 6px;
      height: 18px;
      background: var(--primary);
      border-radius: 3px;
    }

    .control-group {
      background: rgba(0, 0, 0, 0.2);
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.03);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .control-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .control-row span.val {
      color: var(--primary);
      font-weight: 700;
    }

    select {
      background: #1a2035;
      color: var(--primary);
      border: 1px solid var(--primary-dim);
      border-radius: 6px;
      padding: 4px 8px;
      font-family: "Inter", sans-serif;
      font-weight: 600;
      cursor: pointer;
      outline: none;
    }

    select:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      background: transparent;
      margin: 8px 0;
    }

    input[type="range"]:focus {
      outline: none;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      width: 100%;
      height: 6px;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }

    input[type="range"]::-webkit-slider-thumb {
      height: 18px;
      width: 18px;
      border-radius: 50%;
      background: var(--primary);
      cursor: pointer;
      -webkit-appearance: none;
      margin-top: -6px;
      box-shadow: 0 0 10px var(--primary);
      transition: transform 0.1s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    input[type="range"]:disabled::-webkit-slider-thumb {
      background: #555;
      box-shadow: none;
      cursor: not-allowed;
    }

    #dataDisplay {
      background: rgba(0, 229, 255, 0.05);
      border: 1px solid var(--primary-dim);
      border-radius: 12px;
      padding: 15px;
      position: relative;
      overflow: hidden;
    }

    #dataDisplay::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: var(--primary);
      box-shadow: 0 0 10px var(--primary);
    }

    #dataDisplay h3 {
      margin-top: 0;
      color: #fff;
      font-size: 1.05rem;
      margin-bottom: 8px;
    }

    #dataDisplay p {
      margin: 5px 0 0 0;
      font-family: monospace;
      font-size: 0.95rem;
      color: #cbd5e1;
      display: flex;
      justify-content: space-between;
    }

    #dataDisplay span.val {
      color: var(--primary);
      font-weight: 700;
    }

    /* Live Equation block */
    .live-equation {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--primary-dim);
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
    }

    .live-equation span.live-value {
      font-weight: bold;
    }

    .live-equation .result {
      color: var(--primary);
      font-weight: 800;
      font-size: 1.25rem;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 5px;
      flex-wrap: wrap;
    }

    button {
      flex: 1;
      min-width: 100px;
      background: rgba(255, 255, 255, 0.05);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
      font-family: "Inter", sans-serif;
      transition: all 0.3s;
    }

    button.primary {
      background: var(--primary);
      color: #000;
      border: none;
      box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
    }

    button:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
    }

    button.primary:hover {
      background: #00cce6;
      box-shadow: 0 5px 20px rgba(0, 229, 255, 0.6);
    }

    #simulationPanel {
      grid-area: simulation;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0;
      overflow: hidden;
      min-height: 380px;
    }

    canvas#hallCanvas {
      width: 100%;
      height: 100%;
      max-height: 380px;
      border-radius: 16px;
      background: #0a0f1c;
      box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.8);
    }

    #graphPanel {
      grid-area: graph;
      min-height: 250px;
      display: flex;
      flex-direction: column;
    }

    .graph-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    @media (max-width: 900px) {
      .main-container {
        grid-template-columns: 1fr;
        grid-template-areas: "simulation" "controls" "graph";
        padding: 10px 15px 30px;
      }
      h1 {
        font-size: 1.5rem;
      }
      .glass-panel {
        padding: 16px;
      }
      .live-equation {
        font-size: 0.9rem;
      }
      canvas#hallCanvas {
        min-height: 250px;
      }
      .btn-group {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <h1>Advanced Hall Effect Lab</h1>

  <div class="main-container">
    <!-- CONTROL PANEL -->
    <div id="controlPanel" class="glass-panel">
      <h2>Simulation Parameters</h2>

      <div class="control-group">
        <div class="control-row">
          <label>Material Preset</label>
          <select id="materialSelect">
            <option value="custom">Custom</option>
            <option value="copper">Copper (Metal)</option>
            <option value="si_n" selected>Silicon (n-type)</option>
            <option value="si_p">Silicon (p-type)</option>
            <option value="gaas_n">GaAs (n-type)</option>
          </select>
        </div>
        <div class="control-row" style="margin-top: 8px;">
          <label>Carrier Type</label>
          <select id="carrierType">
            <option value="electron">Electrons (n-type, -)</option>
            <option value="hole">Holes (p-type, +)</option>
          </select>
        </div>
      </div>

      <div class="control-group">
        <div class="control-row">
          <label>Base Density (log₁₀ n)</label>
          <span class="val">10^<span id="nValue">21.0</span> m⁻³</span>
        </div>
        <input type="range" id="density" min="20" max="29" step="0.1" value="21.0">

        <div class="control-row" style="margin-top: 10px;">
          <label>Thickness d</label>
          <span class="val"><span id="dValue">1.0</span> mm</span>
        </div>
        <input type="range" id="thickness" min="0.1" max="5.0" step="0.1" value="1.0">
      </div>

      <div class="control-group">
        <div class="control-row">
          <label>Magnetic Field B</label>
          <span class="val"><span id="bValue">1.0</span> T</span>
        </div>
        <input type="range" id="magneticField" min="-2" max="2" step="0.1" value="1.0">

        <div class="control-row" style="margin-top: 10px;">
          <label>Current I</label>
          <span class="val"><span id="iValue">10</span> mA</span>
        </div>
        <input type="range" id="current" min="-50" max="50" step="1" value="10">
      </div>

      <div id="dataDisplay">
        <h3>Live Measurements</h3>
        <p>Hall Coeff (R<sub>H</sub>): <span class="val"><span id="rhValue">0</span> m³/C</span></p>
        <p>Drift Velocity (v<sub>d</sub>): <span class="val"><span id="vdValue">0</span> m/s</span></p>
        <p>Hall Voltage (V<sub>H</sub>): <span class="val"><span id="vhValue">0 V</span></span></p>
      </div>

      <!-- Real-time Equation panel -->
      <div class="live-equation">
        <h3 style="margin:0 0 10px 0; font-size:1.05rem; color:#fff;">Live Math Computation</h3>
        <div style="font-family:monospace; font-size:1rem; color:#cbd5e1; margin-bottom:8px;">
          V<sub>H</sub> = <span style="color:#00e5ff">(I · B)</span> / <span style="color:#ffcc00">(n · q · d)</span>
        </div>
        <div style="font-family:monospace; font-size:0.9rem; color:#94a3b8; line-height:1.6;">
          = (<span id="eq_I" class="live-value" style="color:#00e5ff"></span> A · <span id="eq_B" class="live-value"
            style="color:#00e5ff"></span> T) /<br>
          (<span id="eq_n" class="live-value" style="color:#ffcc00"></span> m⁻³ · <span id="eq_q" class="live-value"
            style="color:#ffcc00"></span> C · <span id="eq_d" class="live-value" style="color:#ffcc00"></span> m)
        </div>
        <div style="margin-top:10px;">
          <span class="result" id="eq_result"></span>
        </div>
      </div>

      <div class="btn-group">
        <button id="exportCsvBtn">Export CSV</button>
        <button id="infoBtn" class="primary" onclick="window.location.href='abstract.html'">Review Physics</button>
      </div>
    </div>

    <!-- SIMULATION PANEL -->
    <div id="simulationPanel" class="glass-panel" style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px;">
      <canvas id="hallCanvas" width="800" height="380"></canvas>
      <button onclick="window.location.href='simulation-3d.html'" style="padding: 12px 30px; font-size: 1rem; background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); color: #000; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; box-shadow: 0 0 20px rgba(0, 242, 254, 0.4); width: 80%; max-width: 400px;">🚀 Launch Premium 3D View</button>
    </div>

    <!-- GRAPH PANEL -->
    <div id="graphPanel" class="glass-panel">
      <div class="graph-header">
        <h2>Data Visualization</h2>
        <select id="graphType">
          <option value="B">VH vs Magnetic Field (Hold I const)</option>
          <option value="I">VH vs Current (Hold B const)</option>
        </select>
      </div>
      <div style="flex:1; position:relative;">
        <canvas id="hallGraph"></canvas>
      </div>
    </div>
  </div>

  <script>
    // --- Physics Engine ---
    class HallPhysicsEngine {
      constructor() {
        this.q_e = 1.602e-19;
      }

      calculateDriftVelocity(I_A, n, w_m, d_m, carrierType) {
        const q = (carrierType === 'electron') ? -this.q_e : this.q_e;
        return I_A / (n * q * w_m * d_m);
      }

      calculateHallVoltage(I_A, B_T, n, d_m, carrierType) {
        const q = (carrierType === 'electron') ? -this.q_e : this.q_e;
        return (B_T * I_A) / (n * q * d_m);
      }

      calculateHallCoefficient(n, carrierType) {
        const q = (carrierType === 'electron') ? -this.q_e : this.q_e;
        return 1 / (n * q);
      }
    }
    const physics = new HallPhysicsEngine();

    // --- State & UI Logic ---
    const presets = {
      custom: { carrier: 'electron', nLog: 21.0 },
      copper: { carrier: 'electron', nLog: 28.9 },
      si_n: { carrier: 'electron', nLog: 21.0 },
      si_p: { carrier: 'hole', nLog: 21.0 },
      gaas_n: { carrier: 'electron', nLog: 22.0 }
    };

    let state = {
      material: 'si_n', carrierType: 'electron',
      nLog: 21.0, d_mm: 1.0, B_T: 1.0, I_mA: 10,
      graphType: 'B'
    };

    let current_vh = 0; // The transient moving voltage

    const DOM = {
      material: document.getElementById('materialSelect'),
      carrier: document.getElementById('carrierType'),
      density: document.getElementById('density'), nVal: document.getElementById('nValue'),
      thickness: document.getElementById('thickness'), dVal: document.getElementById('dValue'),
      magnetic: document.getElementById('magneticField'), bVal: document.getElementById('bValue'),
      current: document.getElementById('current'), iVal: document.getElementById('iValue'),
      rhVal: document.getElementById('rhValue'), vdVal: document.getElementById('vdValue'),
      vhVal: document.getElementById('vhValue'), graphType: document.getElementById('graphType')
    };

    function updateControlsFromPreset() {
      if (state.material !== 'custom') {
        const p = presets[state.material];
        state.carrierType = p.carrier; state.nLog = p.nLog;
        DOM.carrier.value = p.carrier; DOM.density.value = p.nLog;
        DOM.carrier.disabled = true; DOM.density.disabled = true;
      } else {
        DOM.carrier.disabled = false; DOM.density.disabled = false;
      }
      DOM.nVal.textContent = parseFloat(state.nLog).toFixed(1);
    }

    function formatVoltage(v) {
      const absV = Math.abs(v);
      if (absV === 0) return "0.00 V";
      if (absV >= 1) return v.toFixed(3) + " V";
      if (absV >= 1e-3) return (v * 1e3).toFixed(3) + " mV";
      if (absV >= 1e-6) return (v * 1e6).toFixed(3) + " µV";
      return (v * 1e9).toFixed(3) + " nV";
    }

    function updateLiveMeasurements() {
      const n = Math.pow(10, state.nLog);
      const I_A = state.I_mA * 1e-3;
      const d_m = state.d_mm * 1e-3;
      const w_m = 0.01;

      const rh = physics.calculateHallCoefficient(n, state.carrierType);
      const vd = physics.calculateDriftVelocity(I_A, n, w_m, d_m, state.carrierType);
      const vh_target = physics.calculateHallVoltage(I_A, state.B_T, n, d_m, state.carrierType);

      DOM.rhVal.textContent = rh.toExponential(2);
      DOM.vdVal.textContent = vd.toExponential(2);
      DOM.vhVal.textContent = formatVoltage(vh_target);

      const q_val = state.carrierType === 'electron' ? -1.602e-19 : 1.602e-19;
      document.getElementById('eq_I').textContent = I_A.toExponential(2);
      document.getElementById('eq_B').textContent = state.B_T.toFixed(2);
      document.getElementById('eq_n').textContent = n.toExponential(2);
      document.getElementById('eq_q').textContent = q_val.toExponential(3);
      document.getElementById('eq_d').textContent = d_m.toExponential(2);
      document.getElementById('eq_result').textContent = formatVoltage(vh_target);

      return { rh, vd, vh: vh_target };
    }

    // Wiring events
    DOM.material.addEventListener("change", e => { state.material = e.target.value; updateControlsFromPreset(); attemptUpdateGraph(); });
    DOM.carrier.addEventListener("change", e => { state.carrierType = e.target.value; attemptUpdateGraph(); });
    DOM.density.addEventListener("input", e => { state.nLog = parseFloat(e.target.value); DOM.nVal.textContent = state.nLog.toFixed(1); attemptUpdateGraph(); });
    DOM.thickness.addEventListener("input", e => { state.d_mm = parseFloat(e.target.value); DOM.dVal.textContent = state.d_mm.toFixed(1); attemptUpdateGraph(); });
    DOM.magnetic.addEventListener("input", e => { state.B_T = parseFloat(e.target.value); DOM.bVal.textContent = state.B_T.toFixed(1); attemptUpdateGraph(); });
    DOM.current.addEventListener("input", e => { state.I_mA = parseFloat(e.target.value); DOM.iVal.textContent = state.I_mA.toFixed(1); attemptUpdateGraph(); });
    DOM.graphType.addEventListener("change", e => { state.graphType = e.target.value; resetGraph(); attemptUpdateGraph(); });
    document.getElementById("exportCsvBtn").addEventListener("click", () => {
      let csvContent = "data:text/csv;charset=utf-8,";
      const xLabel = state.graphType === 'B' ? "Magnetic Field (T)" : "Current (mA)";
      csvContent += `${xLabel},Hall Voltage (V)\n`;
      for (let i = 0; i < chartData.labels.length; i++) csvContent += `${chartData.labels[i]},${chartData.datasets[0].data[i]}\n`;
      const encodedUri = encodeURI(csvContent);
      const link = document.createElement("a"); link.setAttribute("href", encodedUri); link.setAttribute("download", "hall_effect_data.csv");
      document.body.appendChild(link); link.click(); document.body.removeChild(link);
    });

    // --- Charting ---
    const ctxGraph = document.getElementById("hallGraph").getContext("2d");
    Chart.defaults.color = "#94a3b8"; Chart.defaults.font.family = "Inter";
    let chartData = {
      labels: [],
      datasets: [{
        label: "Hall Voltage", data: [], borderColor: "#00e5ff", backgroundColor: "rgba(0, 229, 255, 0.1)",
        borderWidth: 2, fill: true, tension: 0.3, pointRadius: 3, pointBackgroundColor: "#fff",
      }]
    };
    const hallChart = new Chart(ctxGraph, {
      type: "line", data: chartData,
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: {
          x: { title: { display: true, text: "X Axis" }, grid: { color: "rgba(255,255,255,0.05)" } },
          y: {
            title: { display: true, text: "Hall Voltage" }, grid: { color: "rgba(255,255,255,0.05)" },
            ticks: { callback: function (val) { return formatVoltage(val); } }
          }
        },
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: (ctx) => formatVoltage(ctx.raw) } } }
      }
    });

    let lastGraphX = null;
    function resetGraph() {
      chartData.labels = []; chartData.datasets[0].data = []; lastGraphX = null;
      hallChart.options.scales.x.title.text = state.graphType === 'B' ? "Magnetic Field (T)" : "Current (mA)";
      hallChart.update();
    }
    function attemptUpdateGraph() {
      const { vh } = updateLiveMeasurements();
      const xVal = state.graphType === 'B' ? state.B_T : state.I_mA;
      if (lastGraphX !== xVal) {
        chartData.labels.push(xVal.toFixed(1)); chartData.datasets[0].data.push(vh);
        if (chartData.labels.length > 30) { chartData.labels.shift(); chartData.datasets[0].data.shift(); }
        hallChart.update(); lastGraphX = xVal;
      }
    }

    // --- Canvas Visuals ---
    const canvas = document.getElementById("hallCanvas");
    const ctx = canvas.getContext("2d");
    let particles = [];
    const numParticles = 40;
    const conductor = { x: 150, y: 140, width: 500, height: 100 };

    function initParticles() {
      particles = [];
      for (let i = 0; i < numParticles; i++) {
        particles.push({
          x: conductor.x + Math.random() * conductor.width,
          y: conductor.y + Math.random() * conductor.height,
          size: Math.random() * 2 + 3
        });
      }
    }

    function drawArrow(fromx, fromy, tox, toy, color, label) {
      if (Math.abs(fromx - tox) < 1 && Math.abs(fromy - toy) < 1) return;
      const headlen = 8; const dx = tox - fromx; const dy = toy - fromy; const angle = Math.atan2(dy, dx);
      ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 2;
      ctx.moveTo(fromx, fromy); ctx.lineTo(tox, toy);
      ctx.lineTo(tox - headlen * Math.cos(angle - Math.PI / 6), toy - headlen * Math.sin(angle - Math.PI / 6));
      ctx.moveTo(tox, toy); ctx.lineTo(tox - headlen * Math.cos(angle + Math.PI / 6), toy - headlen * Math.sin(angle + Math.PI / 6));
      ctx.stroke();
      ctx.fillStyle = color; ctx.font = "bold 13px Inter";
      ctx.fillText(label, tox + (dx > 0 ? 5 : -25), toy + (dy > 0 ? 15 : -5));
    }

    function drawSystem(target_vh, current_vh) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const grad = ctx.createLinearGradient(0, conductor.y, 0, conductor.y + conductor.height);
      grad.addColorStop(0, "#1f2738"); grad.addColorStop(0.5, "#2a3449"); grad.addColorStop(1, "#151b29");
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.roundRect(conductor.x, conductor.y, conductor.width, conductor.height, 8); ctx.fill();
      ctx.strokeStyle = "rgba(255,255,255,0.15)"; ctx.lineWidth = 2; ctx.stroke();

      // Equipotential Lines (Tilted based on Hall voltage)
      ctx.strokeStyle = "rgba(255, 255, 255, 0.1)";
      ctx.lineWidth = 1.5;
      ctx.setLineDash([8, 8]);
      const maxExpectedV = state.nLog < 23 ? 5 : 1e-4;
      let intensity = Math.min(1, Math.abs(current_vh) / maxExpectedV);
      const tiltAngle = (current_vh > 0 ? -1 : 1) * intensity * 0.45; // up to ~25 degrees

      for (let i = 0; i <= 6; i++) {
        const cx = conductor.x + 40 + i * 70;
        const cy = conductor.y + conductor.height / 2;
        const dx = Math.sin(tiltAngle) * (conductor.height / 2);
        const dy = Math.cos(tiltAngle) * (conductor.height / 2);

        ctx.beginPath();
        ctx.moveTo(cx - dx, cy - dy);
        ctx.lineTo(cx + dx, cy + dy);
        ctx.stroke();
      }
      ctx.setLineDash([]);

      if (state.B_T !== 0) {
        ctx.fillStyle = "rgba(0, 255, 159, 0.4)"; ctx.font = "24px Inter"; ctx.textAlign = "center";
        const symbol = state.B_T > 0 ? "⊗" : "⊙";
        for (let i = 0; i < 6; i++) ctx.fillText(symbol, 200 + i * 80, conductor.y - 20);
        ctx.fillStyle = "#00ff9f"; ctx.font = "14px Inter";
        const dir = state.B_T > 0 ? "Into Screen" : "Out of Screen";
        ctx.fillText(`B: ${state.B_T.toFixed(1)}T (${dir})`, 400, conductor.y - 45);
      }

      if (Math.abs(current_vh) > 1e-12) {
        if (intensity > 0.05) {
          const topColor = current_vh > 0 ? `rgba(255,51,102,${intensity * 0.5})` : `rgba(0,229,255,${intensity * 0.5})`;
          const bottomColor = current_vh < 0 ? `rgba(255,51,102,${intensity * 0.5})` : `rgba(0,229,255,${intensity * 0.5})`;
          ctx.fillStyle = topColor; ctx.fillRect(conductor.x, conductor.y, conductor.width, 10);
          ctx.fillStyle = bottomColor; ctx.fillRect(conductor.x, conductor.y + conductor.height - 10, conductor.width, 10);
        }
      }

      ctx.fillStyle = "rgba(255,255,255,0.8)"; ctx.textAlign = "left"; ctx.font = "14px Inter";
      ctx.fillText(`Current I (${state.I_mA}mA) →`, 20, conductor.y + 55);
    }

    function animate() {
      const { vd, vh } = updateLiveMeasurements();

      // Transient physics simulation
      current_vh += (vh - current_vh) * 0.08;

      drawSystem(vh, current_vh);

      const baseSpeed = (Math.abs(state.I_mA) / 50) * 3 + 0.5;
      const vx = Math.sign(vd) * baseSpeed;

      const q_sign = state.carrierType === 'electron' ? -1 : 1;
      const F_B_canvas_y = q_sign * vx * state.B_T;

      // Calculate continuous visual Field mapping Mapping K = -F_B / V_H (eval point at B=1)
      const F_B_test = q_sign * vx * 1.0;
      const VH_test = physics.calculateHallVoltage(state.I_mA * 1e-3, 1.0, Math.pow(10, state.nLog), state.d_mm * 1e-3, state.carrierType);
      const K = VH_test !== 0 ? (-F_B_test / VH_test) : 0;
      const F_E_canvas_y = K * current_vh;

      const F_net_canvas_y = F_B_canvas_y + F_E_canvas_y;

      particles.forEach((p, idx) => {
        p.x += vx;
        if (p.x > conductor.x + conductor.width) { p.x = conductor.x; p.y = conductor.y + Math.random() * conductor.height; }
        if (p.x < conductor.x) { p.x = conductor.x + conductor.width; p.y = conductor.y + Math.random() * conductor.height; }

        p.y += F_net_canvas_y * 10;
        p.y += (Math.random() - 0.5) * 1.5;

        // Visual clamping so they don't escape
        if (p.y < conductor.y + p.size / 2) p.y = conductor.y + p.size / 2;
        if (p.y > conductor.y + conductor.height - p.size / 2) p.y = conductor.y + conductor.height - p.size / 2;

        let renderSize = p.size;
        let color = state.carrierType === 'electron' ? "#00e5ff" : "#ff3366";

        if (idx === 0) {
          renderSize = 8;
          const arrowLenScale = 15;
          if (Math.abs(F_B_canvas_y) > 0.01) {
            drawArrow(p.x, p.y, p.x, p.y + Math.sign(F_B_canvas_y) * (Math.abs(F_B_canvas_y) * arrowLenScale + 10), "#ffcc00", "F_B");
          }
          if (Math.abs(F_E_canvas_y) > 0.01) {
            drawArrow(p.x, p.y, p.x, p.y + Math.sign(F_E_canvas_y) * (Math.abs(F_E_canvas_y) * arrowLenScale + 10), "#00ff9f", "F_E");
          }
        }

        ctx.beginPath();
        ctx.arc(p.x, p.y, renderSize, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.shadowColor = color;
        ctx.shadowBlur = idx === 0 ? 15 : 6;
        ctx.fill();
        ctx.shadowBlur = 0;
      });

      requestAnimationFrame(animate);
    }

    updateControlsFromPreset();
    resetGraph();
    attemptUpdateGraph();
    initParticles();
    animate();

  </script>
</body>
